<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>面接チェック ロールプレイ</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="setup-panel" id="setupPanel">
        <div class="brand-mark">Interview Check</div>
        <h1>面接ロールプレイ<br />チェックシート</h1>
        <p class="lead">
          質問ごとにチェック項目を確認し、解答終了時点までの平均達成率を表示します。
        </p>

        <form class="setup-form" id="setupForm">
          <label for="questionCount">質問数</label>
          <div class="number-control">
            <button type="button" id="decreaseBtn" aria-label="質問数を減らす">-</button>
            <input id="questionCount" type="number" min="1" max="99" value="3" required />
            <button type="button" id="increaseBtn" aria-label="質問数を増やす">+</button>
          </div>
          <p class="hint">最小1問、最大99問。表示名は「質問①」「質問②」の形式です。</p>
          <button class="primary-action" type="submit">チェックを開始</button>
        </form>
      </section>

      <section class="work-panel hidden" id="workPanel" aria-live="polite">
        <header class="work-header">
          <div>
            <p class="eyebrow" id="progressText">1 / 3</p>
            <h2 id="questionTitle">質問①</h2>
          </div>
          <div class="status-stack">
            <div class="timer-chip timer-safe" id="timerDisplay">0.00</div>
            <div class="score-chip" id="currentScore">0%</div>
          </div>
        </header>

        <div class="progress-bar" aria-hidden="true">
          <span id="progressFill"></span>
        </div>

        <div class="question-layout">
          <aside class="question-list" id="questionList" aria-label="質問一覧"></aside>

          <form class="check-card" id="checkForm">
            <div class="check-card-header">
              <h3>チェック項目</h3>
              <button class="ghost-action" type="button" id="resetQuestionBtn">この質問をリセット</button>
            </div>

            <div class="check-items" id="checkItems"></div>

            <div class="memo-field">
              <label for="memoInput">メモ</label>
              <textarea id="memoInput" rows="4" placeholder="良かった点や改善点を記録"></textarea>
            </div>

            <div class="actions">
              <button class="secondary-action" type="button" id="prevBtn">前の質問</button>
              <button class="secondary-action" type="button" id="nextBtn">次の質問</button>
              <button class="primary-action" type="submit">解答終了</button>
            </div>
          </form>
        </div>
      </section>

      <section class="result-panel hidden" id="resultPanel">
        <p class="eyebrow">Result</p>
        <h2>総合達成率</h2>
        <div class="result-score" id="resultScore">0%</div>
        <p class="result-note" id="resultNote"></p>
        <div class="result-list" id="resultList"></div>
        <div class="actions result-actions">
          <button class="secondary-action" type="button" id="backToCheckBtn">チェックへ戻る</button>
          <button class="primary-action" type="button" id="restartBtn">最初からやり直す</button>
        </div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
